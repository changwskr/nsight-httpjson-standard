<VirtualHost *:443>
    ServerName nh.marketing.com
    SSLEngine on
    # SSLCertificateFile /etc/pki/tls/certs/nh.marketing.com.crt
    # SSLCertificateKeyFile /etc/pki/tls/private/nh.marketing.com.key

    ProxyPass /cc/ balancer://nsight-cc-cluster/cc/
    ProxyPassReverse /cc/ balancer://nsight-cc-cluster/cc/
    ProxyPass /ic/ balancer://nsight-ic-cluster/ic/
    ProxyPassReverse /ic/ balancer://nsight-ic-cluster/ic/
    ProxyPass /pc/ balancer://nsight-pc-cluster/pc/
    ProxyPassReverse /pc/ balancer://nsight-pc-cluster/pc/
    ProxyPass /bc/ balancer://nsight-bc-cluster/bc/
    ProxyPassReverse /bc/ balancer://nsight-bc-cluster/bc/
    ProxyPass /ms/ balancer://nsight-ms-cluster/ms/
    ProxyPassReverse /ms/ balancer://nsight-ms-cluster/ms/
    ProxyPass /sv/ balancer://nsight-sv-cluster/sv/
    ProxyPassReverse /sv/ balancer://nsight-sv-cluster/sv/
    ProxyPass /pd/ balancer://nsight-pd-cluster/pd/
    ProxyPassReverse /pd/ balancer://nsight-pd-cluster/pd/
    ProxyPass /cm/ balancer://nsight-cm-cluster/cm/
    ProxyPassReverse /cm/ balancer://nsight-cm-cluster/cm/
    ProxyPass /eb/ balancer://nsight-eb-cluster/eb/
    ProxyPassReverse /eb/ balancer://nsight-eb-cluster/eb/
    ProxyPass /ep/ balancer://nsight-ep-cluster/ep/
    ProxyPassReverse /ep/ balancer://nsight-ep-cluster/ep/
    ProxyPass /bp/ balancer://nsight-bp-cluster/bp/
    ProxyPassReverse /bp/ balancer://nsight-bp-cluster/bp/
    ProxyPass /bd/ balancer://nsight-bd-cluster/bd/
    ProxyPassReverse /bd/ balancer://nsight-bd-cluster/bd/
    ProxyPass /ss/ balancer://nsight-ss-cluster/ss/
    ProxyPassReverse /ss/ balancer://nsight-ss-cluster/ss/
    ProxyPass /cs/ balancer://nsight-cs-cluster/cs/
    ProxyPassReverse /cs/ balancer://nsight-cs-cluster/cs/
    ProxyPass /ct/ balancer://nsight-ct-cluster/ct/
    ProxyPassReverse /ct/ balancer://nsight-ct-cluster/ct/
    ProxyPass /mg/ balancer://nsight-mg-cluster/mg/
    ProxyPassReverse /mg/ balancer://nsight-mg-cluster/mg/
    ProxyPass /om/ balancer://nsight-om-cluster/om/
    ProxyPassReverse /om/ balancer://nsight-om-cluster/om/
</VirtualHost>
