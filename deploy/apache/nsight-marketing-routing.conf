# NSIGHT HTTP/JSON 업무별 온라인 진입점 Routing 예시
# 실제 WAS 서버명, 포트, SSL 인증서 경로는 운영환경 기준으로 변경한다.

ServerTokens Prod
ServerSignature Off
TraceEnable Off
Timeout 30
KeepAlive On
KeepAliveTimeout 5
MaxKeepAliveRequests 100

ProxyRequests Off
ProxyPreserveHost On
ProxyTimeout 10
RequestHeader set X-Forwarded-Proto "https"
RequestHeader set X-Forwarded-Port  "443"

# 업무별 Balancer 샘플. 실제 운영에서는 업무그룹별/업무별 WAS 주소로 조정한다.

<Proxy "balancer://nsight-cc-cluster">
    BalancerMember "http://nsight-cc-ap01:8080" route=cc01 retry=5 connectiontimeout=3 timeout=10
    BalancerMember "http://nsight-cc-ap02:8080" route=cc02 retry=5 connectiontimeout=3 timeout=10
    ProxySet lbmethod=byrequests
    ProxySet stickysession=JSESSIONID|jsessionid
    ProxySet failontimeout=On
</Proxy>

