server:
  port: 8086
  forward-headers-strategy: framework
  servlet:
    context-path: /
    encoding:
      charset: UTF-8
      enabled: true
      force: true
    session:
      timeout: 60m
      tracking-modes: cookie
      cookie:
        name: JSESSIONID
        path: /
        http-only: true
        secure: false
        same-site: Lax

spring:
  application:
    name: nsight-pd-service
  profiles:
    active: local
  datasource:
    url: jdbc:h2:mem:nsight_pd;MODE=Oracle;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  session:
    store-type: jdbc
    timeout: 60m
    jdbc:
      initialize-schema: embedded
      table-name: SPRING_SESSION
  transaction:
    default-timeout: 5
  jackson:
    time-zone: Asia/Seoul
    default-property-inclusion: non_null

mybatis:
  mapper-locations: classpath:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    default-statement-timeout: 3
    jdbc-type-for-null: NULL
    call-setters-on-nulls: true
    default-fetch-size: 500
    cache-enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,threaddump
  endpoint:
    health:
      probes:
        enabled: true

nsight:
  module:
    system-id: NSIGHT-MP
    business-code: PD
    ap-id: local-pd-ap01
    session-validation-enabled: false
    authorization-validation-enabled: false
    idempotency-enabled: false
  timeout:
    online-transaction-seconds: 5
    db-query-seconds: 3
